<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>xode</title>
<meta name="description" content="xode" />
<link rel="icon" type="image/png" href="assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #1f1f22;
    --bg-soft: #26262a;
    --fg: #e7e7ec;
    --muted: #8a8a96;
    --accent: #7c8cf0;
    --accent-deep: #5a6ed4;
    --side-col: 11rem;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    display: grid;
    place-items: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  main {
    display: grid;
    grid-template-columns: var(--side-col) auto var(--side-col);
    grid-template-rows: auto auto;
    column-gap: 0.5rem;
    align-items: center;
    justify-items: center;
  }
  .logo-link {
    grid-column: 2;
    grid-row: 1;
    display: inline-block;
    margin-bottom: 1.25rem;
    line-height: 0;
    transition: transform 200ms ease;
  }
  .logo-link:hover { transform: translateY(-2px); }
  .logo-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }
  .logo {
    width: 128px;
    height: 128px;
    image-rendering: -webkit-optimize-contrast;
    filter: drop-shadow(0 8px 24px rgba(124,140,240,0.35));
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  h1, .bracket {
    font-size: clamp(2.5rem, 8vw, 4rem);
    letter-spacing: 0.04em;
    font-weight: 600;
    line-height: 1;
    margin: 0;
  }
  h1 { grid-column: 2; grid-row: 2; }
  .bracket { color: var(--accent); }
  .bracket .pipe { color: #4a4a52; margin-right: 0.4em; }
  .bracket-left  { grid-column: 1; grid-row: 2; justify-self: end; white-space: nowrap; }
  .bracket-right { grid-column: 3; grid-row: 2; justify-self: start; }
  @media (max-width: 600px) {
    :root { --side-col: auto; }
    body { padding: 1rem; }
    main { column-gap: 0.4rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo { animation: none; }
  }
</style>
</head>
<body>
  <main>
    <a class="logo-link" href="https://github.com/xode-dev" target="_blank" rel="noopener noreferrer" aria-label="xode on GitHub">
      <img class="logo" src="assets/logo.png" alt="Xode" />
    </a>
    <span class="bracket bracket-left"><span class="pipe">|</span>&lt;</span>
    <h1>xode</h1>
    <span class="bracket bracket-right">/&gt;</span>
  </main>
</body>
</html>
